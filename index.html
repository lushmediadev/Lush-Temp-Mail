<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LushMail - Temp mail admin dashboard cho congmail.top">
  <title>LushMail Admin</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="shortcut icon" href="logo.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            lush: {
              50: '#fff7f5',
              100: '#fff0eb',
              200: '#ffd9cc',
              300: '#ffb8a3',
              400: '#ff8c6b',
              500: '#ff5528',
              600: '#e64a20',
              700: '#cc3f18',
              800: '#a33010',
              900: '#7a2008',
            }
          },
          fontFamily: {
            fustat: ['Fustat', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fustat:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="style.css?v=20260321-admin-checkbox-align-3">
</head>
<body class="font-inter antialiased bg-white text-gray-800 min-h-screen">
  <div id="loginPage" class="min-h-screen flex items-center justify-center relative overflow-hidden">
    <div class="absolute top-[-120px] left-[-80px] w-[500px] h-[500px] bg-lush-500/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-100px] right-[-60px] w-[400px] h-[400px] bg-lush-400/15 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="relative z-10 w-full max-w-md mx-4">
      <div class="login-glass rounded-3xl p-8 sm:p-10 shadow-2xl shadow-lush-500/10">
        <div class="flex flex-col items-center mb-8">
          <img src="logo.svg" alt="LushMail Logo" class="w-14 h-14 mb-3">
          <h1 class="font-fustat text-3xl font-bold text-gray-900">Lush<span class="text-lush-500">Mail</span></h1>
          <p class="text-gray-500 text-sm mt-1">Temp mail admin cho hệ thống congmail.top</p>
        </div>

        <form id="loginForm" class="space-y-4">
          <div>
            <label for="loginEmail" class="block text-sm font-medium text-gray-700 mb-1.5">Tên tài khoản</label>
            <div class="relative">
              <i data-lucide="shield-check" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4.5 h-4.5 text-gray-400"></i>
              <input type="text" id="loginEmail" name="username" autocomplete="username" placeholder="admin hoặc user"
                class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 bg-white/80 backdrop-blur-sm text-sm focus:outline-none focus:ring-2 focus:ring-lush-500/40 focus:border-lush-500 transition-all placeholder:text-gray-400">
            </div>
          </div>
          <div>
            <label for="loginPassword" class="block text-sm font-medium text-gray-700 mb-1.5">Mật khẩu</label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4.5 h-4.5 text-gray-400"></i>
              <input type="password" id="loginPassword" name="password" autocomplete="current-password" placeholder="••••••••"
                class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 bg-white/80 backdrop-blur-sm text-sm focus:outline-none focus:ring-2 focus:ring-lush-500/40 focus:border-lush-500 transition-all placeholder:text-gray-400">
            </div>
          </div>

          <button type="submit" id="loginBtn"
            class="w-full py-3.5 bg-lush-500 hover:bg-lush-600 text-white font-semibold rounded-xl transition-all duration-200 hover:scale-[1.02] hover:shadow-lg hover:shadow-lush-500/30 active:scale-[0.98] flex items-center justify-center gap-2 text-sm">
            <i data-lucide="log-in" class="w-4.5 h-4.5"></i>
            Đăng nhập
          </button>
        </form>

        <p id="loginError" class="hidden text-center text-sm text-red-500 mt-4"></p>
      </div>
    </div>
  </div>

  <div id="appPage" class="hidden min-h-screen flex flex-col">
    <nav class="sticky top-0 z-50 nav-glass border-b border-gray-200/50">
      <div class="max-w-[1600px] mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <button id="sidebarToggle" class="lg:hidden p-2 rounded-xl hover:bg-gray-100 transition-colors">
            <i data-lucide="menu" class="w-5 h-5 text-gray-600"></i>
          </button>
          <img src="logo.svg" alt="LushMail" class="w-8 h-8">
          <span class="font-fustat font-bold text-xl text-gray-900">Lush<span class="text-lush-500">Mail</span></span>
        </div>
        <div class="w-8"></div>
      </div>
    </nav>

    <div class="flex-1 flex max-w-[1600px] w-full mx-auto min-h-0">
      <div id="sidebarOverlay" class="fixed inset-0 bg-black/30 z-30 hidden lg:hidden"></div>

      <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-40 w-72 bg-white border-r border-gray-100 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col min-h-0 pt-4 lg:pt-0">
        <div class="lg:hidden flex items-center justify-between px-4 py-3 border-b border-gray-100">
          <span class="font-fustat font-bold text-lg text-gray-900">Menu</span>
          <button id="closeSidebarBtn" class="p-1.5 rounded-lg hover:bg-gray-100 transition-colors">
            <i data-lucide="x" class="w-5 h-5 text-gray-500"></i>
          </button>
        </div>

        <nav id="mailNav" class="px-3 pt-4 space-y-0.5 flex-1 overflow-y-auto pb-4">
          <button data-filter="all" class="folder-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-150 active">
            <i data-lucide="inbox" class="w-4.5 h-4.5"></i>
            <span class="flex-1 text-left">Tất cả email</span>
          </button>
          <button data-filter="unread" class="folder-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-150">
            <i data-lucide="mail-open" class="w-4.5 h-4.5"></i>
            <span class="flex-1 text-left">Chưa đọc</span>
          </button>
          <button data-filter="important" class="folder-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-150">
            <i data-lucide="star" class="w-4.5 h-4.5"></i>
            <span class="flex-1 text-left">Quan trọng</span>
          </button>
          <button data-filter="otp" class="folder-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-150">
            <i data-lucide="badge-check" class="w-4.5 h-4.5"></i>
            <span class="flex-1 text-left">Có OTP</span>
          </button>
          <button data-filter="links" class="folder-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-150">
            <i data-lucide="link" class="w-4.5 h-4.5"></i>
            <span class="flex-1 text-left">Có link verify</span>
          </button>
        </nav>

        <div class="px-3 py-4 border-t border-gray-100 mt-auto">
          <button id="logoutBtn" class="w-full flex items-center gap-2 px-3 py-2.5 text-sm font-medium text-gray-500 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all duration-150">
            <i data-lucide="log-out" class="w-4 h-4"></i>
            Đăng xuất
          </button>
        </div>
      </aside>

      <main class="flex-1 flex flex-col min-w-0 app-main-shell">
        <div class="border-b border-gray-100 px-4 sm:px-6 py-3 flex items-center justify-between bg-white">
          <div class="flex items-center gap-3">
            <h3 id="folderTitle" class="font-fustat text-lg font-bold text-gray-900">Tất cả email</h3>
            <span id="folderCount" class="text-xs text-gray-400 font-medium bg-gray-100 px-2 py-0.5 rounded-full">0 email</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="hidden sm:flex relative">
              <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
              <input type="text" id="mainSearch" placeholder="T&#236;m theo alias, sender, subject..."
                class="pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-xl bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-lush-500/30 focus:border-lush-400 transition-all w-60 placeholder:text-gray-400">
            </div>
            <button id="deleteAllBtn" class="p-2 rounded-xl hover:bg-gray-100 transition-colors" type="button" title="X&#243;a t&#7845;t c&#7843; email trong inbox hi&#7879;n t&#7841;i">
              <i data-lucide="trash-2" class="w-4.5 h-4.5 text-gray-500"></i>
            </button>
          </div>
        </div>

        <div class="flex-1 min-h-0 relative">
          <div id="emailList" class="h-full overflow-y-auto bg-white"></div>

          <div id="emptyState" class="hidden absolute inset-0 flex-col items-center justify-center py-16 text-center px-4 bg-white">
            <div class="w-20 h-20 rounded-full bg-gray-100 flex items-center justify-center mb-4">
              <i data-lucide="inbox" class="w-8 h-8 text-gray-300"></i>
            </div>
            <h4 class="font-fustat text-lg font-bold text-gray-400 mb-1">Chưa có email nào</h4>
            <p class="text-sm text-gray-400 max-w-xs">Khi hệ thống bắt được email mới, danh sách sẽ xuất hiện ở đây.</p>
          </div>
        </div>

        <footer id="paginationFooter" class="border-t border-gray-100 bg-white px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
          <div id="paginationInfo" class="text-sm text-gray-500">0 / 0 email</div>
          <div id="paginationControls" class="flex items-center gap-2"></div>
        </footer>
      </main>

      <div id="emailDetail" class="hidden lg:block w-[420px] flex-shrink-0 min-h-0 relative">
        <div class="detail-edge-panel">
          <div id="detailContent" class="detail-panel-content p-6">
          <div class="flex flex-col items-center justify-center py-20 text-center">
            <div class="w-16 h-16 rounded-full bg-gray-50 flex items-center justify-center mb-4">
              <i data-lucide="mouse-pointer-click" class="w-7 h-7 text-gray-300"></i>
            </div>
            <p class="text-sm text-gray-400">Chọn email để xem chi tiết</p>
          </div>
        </div>
        </div>
      </div>
    </div>

    <div id="mobileDetail" class="fixed inset-0 z-50 bg-white hidden lg:hidden overflow-y-auto">
      <div class="sticky top-0 bg-white/90 backdrop-blur-xl border-b border-gray-100 px-4 py-3 flex items-center gap-3 z-10">
        <button id="closeMobileDetailBtn" class="p-2 rounded-xl hover:bg-gray-100 transition-colors">
          <i data-lucide="arrow-left" class="w-5 h-5 text-gray-600"></i>
        </button>
        <span class="font-fustat font-bold text-gray-900">Chi tiết email</span>
      </div>
      <div id="mobileDetailContent" class="p-4 sm:p-6 bg-[#fffdfa] min-h-full"></div>
    </div>
  </div>

  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] px-5 py-3 bg-gray-900 text-white text-sm font-medium rounded-2xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none flex items-center gap-2">
    <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
    <span id="toastMsg">Done</span>
  </div>

  <script src="app.js?v=20260321-admin-sse-6"></script>
</body>
</html>
